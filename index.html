<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CotizadorGo! — Herramienta Comercial Equifax Chile</title>
<style>
:root{
  --r:#9b1c2e;--rd:#6e1220;--rl:#c0263b;
  --g1:#111;--g2:#1e1e1e;--g3:#282828;--g4:#333;--g5:#444;
  --w:#f0f0f0;--wa:#aaa;--y:#f0c040;--gn:#2ecc71;--bl:#3498db;--or:#e67e22;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--g1);color:var(--w);font-family:'Segoe UI',Arial,sans-serif;font-size:14px;}
header{background:linear-gradient(135deg,var(--rd),#a01f30 60%,#6e1220);padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:200;
  box-shadow:0 3px 20px rgba(0,0,0,.7);border-bottom:1px solid rgba(255,255,255,.1);}
.logo-sub{font-size:.58rem;letter-spacing:3px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-top:1px;}
.uf-widget{display:flex;align-items:center;gap:8px;}
.uf-box{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 12px;text-align:center;}
.uf-box label{display:block;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:1px;}
.uf-box input{background:none;border:none;color:var(--y);font-size:.95rem;font-weight:700;width:90px;text-align:center;font-family:inherit;}
.uf-box input:focus{outline:none;}
.qcount{color:var(--gn);font-size:.9rem;font-weight:700;text-align:center;padding-top:2px;}
/* NAV — scroll horizontal en móvil, sin corte */
nav{background:var(--g2);border-bottom:2px solid var(--g4);display:flex;
  position:fixed;top:65px;left:0;right:0;z-index:199;overflow-x:auto;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;}
nav::-webkit-scrollbar{display:none;}
body{padding-top:107px;}
/* Indicador de scroll */
nav::after{content:'›';position:absolute;right:0;top:0;bottom:0;width:28px;
  background:linear-gradient(90deg,transparent,rgba(30,30,30,.95));
  display:flex;align-items:center;justify-content:center;color:#555;
  font-size:1.2rem;pointer-events:none;transition:opacity .3s;}
.tab{display:inline-flex;align-items:center;gap:5px;padding:11px 14px;border:none;
  border-bottom:3px solid transparent;background:none;color:var(--wa);cursor:pointer;
  font-family:inherit;font-size:.76rem;letter-spacing:.4px;text-transform:uppercase;
  transition:all .15s;white-space:nowrap;scroll-snap-align:start;flex-shrink:0;
  position:relative;}
.tab:hover{color:#fff;background:rgba(155,28,46,.25);}
.tab:hover::after{content:'';position:absolute;inset:0;border-radius:4px;
  box-shadow:0 0 12px rgba(155,28,46,.6),inset 0 0 8px rgba(155,28,46,.15);
  pointer-events:none;}
.tab.on{color:#fff;border-bottom-color:var(--r);background:rgba(155,28,46,.2);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gn);display:none;}
.tab.has-quote .dot{display:inline-block;}
/* Flecha de scroll nav */
.nav-scroll-hint{position:fixed;right:4px;top:65px;height:42px;width:22px;
  display:flex;align-items:center;justify-content:center;z-index:200;
  color:rgba(255,255,255,.4);font-size:.85rem;pointer-events:none;
  animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
main{padding:18px;max-width:1140px;margin:0 auto;}
.panel{display:none;animation:fi .2s ease;}
.panel.on{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ptitle{font-size:1rem;letter-spacing:3px;text-transform:uppercase;color:var(--rl);
  margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--g4);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.badge{background:var(--rd);font-size:.6rem;padding:2px 8px;border-radius:20px;letter-spacing:1px;color:var(--wa);}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px;}
.card{background:var(--g3);border:1px solid var(--g4);border-radius:8px;padding:14px;}
.card:hover{border-color:rgba(155,28,46,.6);}
.cl{font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--wa);margin-bottom:3px;}
.cv{font-size:1.4rem;font-weight:700;color:var(--y);}
.cs{font-size:.7rem;color:var(--wa);margin-top:3px;}
.tbl{overflow-x:auto;border-radius:7px;border:1px solid var(--g4);margin-bottom:16px;}
table{width:100%;border-collapse:collapse;font-size:.79rem;}
thead tr{background:linear-gradient(90deg,var(--rd),#7a1425);}
th{padding:9px 12px;text-align:left;font-size:.68rem;letter-spacing:1px;text-transform:uppercase;color:#fff;white-space:nowrap;}
td{padding:7px 12px;border-bottom:1px solid var(--g4);color:var(--wa);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:rgba(155,28,46,.1);}
.y{color:var(--y);font-weight:600;}.g{color:var(--gn);font-weight:600;}.b{color:var(--bl);}.mu{color:#666;font-size:.72rem;}.or{color:var(--or);}
.cbox{background:var(--g3);border:1px solid var(--g4);border-radius:8px;padding:18px;margin-bottom:16px;}
.cbox h3{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--rl);margin-bottom:12px;}
.crow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.f{display:flex;flex-direction:column;gap:3px;}
.f label{font-size:.63rem;letter-spacing:1px;text-transform:uppercase;color:var(--wa);}
.f select,.f input{background:var(--g1);border:1px solid var(--g5);color:var(--w);
  padding:7px 10px;font-family:inherit;font-size:.82rem;border-radius:5px;min-width:155px;transition:border-color .15s;}
.f select:focus,.f input:focus{outline:none;border-color:var(--rl);}
.btn{background:var(--r);border:none;color:#fff;padding:8px 20px;cursor:pointer;
  font-family:inherit;font-size:.8rem;font-weight:600;border-radius:5px;transition:background .15s;}
.btn:hover{background:var(--rl);}
.btn.sec{background:var(--g4);}.btn.sec:hover{background:var(--g5);}
.res{display:none;margin-top:12px;border-radius:7px;overflow:hidden;}
.res.on{display:block;}
.res-head{background:var(--rd);padding:8px 14px;font-size:.68rem;letter-spacing:2px;
  text-transform:uppercase;color:rgba(255,255,255,.7);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.res-body{background:rgba(0,0,0,.3);border:1px solid rgba(155,28,46,.3);border-top:none;padding:14px;}
.rl{font-size:.8rem;color:var(--wa);margin-bottom:5px;display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;}
.rl b{color:var(--y);}
.res-big{font-size:1.3rem;font-weight:700;color:var(--y);margin:6px 0 3px;}
.save-btn{background:var(--bl);border:none;color:#fff;padding:5px 12px;cursor:pointer;
  font-family:inherit;font-size:.72rem;font-weight:600;border-radius:4px;}
.save-btn:hover{background:#2980b9;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0;}
.gitem{background:var(--g3);border:1px solid var(--g4);border-radius:6px;padding:10px 12px;text-align:center;}
.gitem label{display:block;font-size:.6rem;letter-spacing:1px;text-transform:uppercase;color:var(--wa);margin-bottom:3px;}
.gitem .val{font-size:.95rem;font-weight:700;}
.slider-wrap{margin-top:12px;background:rgba(0,0,0,.25);border-radius:7px;padding:12px 14px;}
.sw-title{font-size:.63rem;letter-spacing:2px;text-transform:uppercase;color:var(--wa);margin-bottom:8px;}
.sw-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px;}
.sw-row input[type=range]{flex:1;min-width:120px;accent-color:var(--r);}
.sw-row input[type=number]{background:var(--g1);border:1px solid var(--g5);color:var(--y);
  padding:5px 8px;font-family:inherit;font-size:.88rem;font-weight:700;border-radius:4px;width:105px;}
.sw-row input[type=number]:focus{outline:none;border-color:var(--rl);}
.alerta{background:rgba(240,192,64,.08);border-left:3px solid var(--y);padding:9px 12px;
  margin-bottom:14px;font-size:.77rem;color:var(--wa);border-radius:0 5px 5px 0;}
.alerta b{color:var(--y);}
.chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.chip{background:var(--g3);border:1px solid var(--g4);border-radius:6px;padding:8px 14px;text-align:center;min-width:90px;}
.chip .n{font-size:1.3rem;font-weight:700;color:var(--bl);}
.chip .t{font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--wa);margin-top:1px;}
.quote-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.qi{background:var(--g3);border:1px solid var(--g4);border-radius:6px;padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.qi-prod{font-size:.8rem;font-weight:600;color:#fff;}
.qi-price{font-size:.9rem;font-weight:700;color:var(--y);}
.qi-meta{font-size:.68rem;color:var(--wa);}
.qi-acts{display:flex;gap:6px;}
.qibtn{background:var(--g4);border:none;color:var(--wa);padding:4px 10px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:.7rem;}
.qibtn:hover{background:var(--g5);color:#fff;}
.qibtn.del{color:#e74c3c;}
.btn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.bacc{background:var(--g3);border:1px solid var(--g4);border-radius:7px;padding:12px 8px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--w);font-family:inherit;transition:all .2s;position:relative;overflow:hidden;}
.bacc span{font-size:.78rem;font-weight:600;}
.bacc small{font-size:.63rem;color:var(--wa);text-align:center;}
.bacc:hover{border-color:var(--rl);background:rgba(155,28,46,.2);
  box-shadow:0 0 14px rgba(155,28,46,.5),inset 0 0 10px rgba(155,28,46,.1);
  transform:translateY(-1px);}
.bacc:active{transform:scale(.96);}
.bacc.wsp{border-color:rgba(37,211,102,.35);background:rgba(37,211,102,.05);}
.bacc.wsp:hover{border-color:#25d366;background:rgba(37,211,102,.12);
  box-shadow:0 0 14px rgba(37,211,102,.4),inset 0 0 10px rgba(37,211,102,.08);}
.bacc.email-btn{border-color:rgba(52,152,219,.35);background:rgba(52,152,219,.05);}
.bacc.email-btn:hover{border-color:#3498db;background:rgba(52,152,219,.12);
  box-shadow:0 0 14px rgba(52,152,219,.4);}
/* Neón general en todos los .btn */
.btn{background:var(--r);border:none;color:#fff;padding:8px 20px;cursor:pointer;
  font-family:inherit;font-size:.8rem;font-weight:600;border-radius:5px;
  transition:all .2s;position:relative;}
.btn:hover{background:var(--rl);box-shadow:0 0 16px rgba(155,28,46,.6);transform:translateY(-1px);}
.btn:active{transform:scale(.97);}
.btn.sec{background:var(--g4);box-shadow:none;}
.btn.sec:hover{background:var(--g5);box-shadow:0 0 10px rgba(255,255,255,.1);}
/* save-btn neón */
.save-btn{background:var(--bl);border:none;color:#fff;padding:5px 12px;cursor:pointer;
  font-family:inherit;font-size:.72rem;font-weight:600;border-radius:4px;transition:all .2s;}
.save-btn:hover{background:#2980b9;box-shadow:0 0 14px rgba(52,152,219,.6);transform:translateY(-1px);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.toast{display:none;padding:9px 14px;border-radius:5px;margin-bottom:10px;font-size:.78rem;}
.toast.ok{background:rgba(46,204,113,.15);border-left:3px solid #2ecc71;color:#2ecc71;}
.toast.err{background:rgba(231,76,60,.15);border-left:3px solid #e74c3c;color:#e74c3c;}
.toast.info{background:rgba(52,152,219,.15);border-left:3px solid #3498db;color:#3498db;}
textarea{background:var(--g1);border:1px solid var(--g4);color:var(--wa);
  font-family:'Courier New',monospace;font-size:.75rem;padding:12px;resize:vertical;
  outline:none;line-height:1.6;border-radius:0 0 7px 7px;width:100%;}
.sync-banner{background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.35);border-radius:6px;
  padding:8px 14px;margin-bottom:12px;font-size:.75rem;color:#2ecc71;display:none;align-items:center;gap:8px;}
.sync-banner.on{display:flex;}
footer{text-align:center;padding:12px;font-size:.63rem;color:#444;
  letter-spacing:1px;border-top:1px solid var(--g4);margin-top:24px;}
/* Pulso neón tab plantillas */
@keyframes neonPulse{
  0%{box-shadow:0 0 8px rgba(46,204,113,.5);border-color:rgba(46,204,113,.6);}
  50%{box-shadow:0 0 22px rgba(46,204,113,.9),0 0 40px rgba(46,204,113,.4);border-color:#2ecc71;background:rgba(46,204,113,.18);}
  100%{box-shadow:0 0 8px rgba(46,204,113,.5);border-color:rgba(46,204,113,.6);}
}
.tab.pulse-neon{
  animation:neonPulse .7s ease-in-out 4;
  border:1px solid rgba(46,204,113,.6);border-radius:4px;
  color:#2ecc71!important;
}
.tab.pulse-neon::after{
  content:'👆 Ir a Plantillas';
  position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);
  background:#111;border:1px solid #2ecc71;color:#2ecc71;
  font-size:.6rem;padding:2px 8px;border-radius:4px;white-space:nowrap;
  pointer-events:none;box-shadow:0 0 8px rgba(46,204,113,.4);
  display:none;
}
#global-toast{position:fixed;bottom:18px;right:18px;z-index:9999;min-width:280px;max-width:400px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);}
/* Auto-gen status */
#auto-gen-status{transition:opacity .3s;}
/* Layout plantillas mejorado */
.mail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
@media(max-width:860px){.mail-grid{grid-template-columns:1fr;}}
/* Botones acción más llamativos */
.bacc{position:relative;}
.bacc .copy-badge{position:absolute;top:4px;right:4px;background:var(--gn);color:#000;
  font-size:.55rem;font-weight:700;padding:1px 5px;border-radius:10px;letter-spacing:.5px;}
@media(max-width:640px){
  .two-col{grid-template-columns:1fr;}
  .btn-grid{grid-template-columns:1fr 1fr;}
  .cards{grid-template-columns:1fr 1fr;}
  .crow{flex-direction:column;}
  .f select,.f input{min-width:100%;}
  header{padding:10px 14px;}
}
@media(max-width:900px){
  #tpl-out>[style*="grid-template-columns:1fr 1fr 1fr"]{
    grid-template-columns:1fr 1fr !important;
  }
}
@media(max-width:600px){
  #tpl-out>[style*="grid-template-columns:1fr 1fr 1fr"]{
    grid-template-columns:1fr !important;
  }
}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:14px;">
    <img src="logo-equifax.png" alt="Equifax" id="header-logo" style="height:32px;width:auto;display:block;filter:brightness(0) invert(1);" onerror="this.style.opacity=0">
    <div>
      <div style="font-size:1.1rem;font-weight:900;letter-spacing:1px;color:#fff;">CotizadorGo!</div>
      <div class="logo-sub">Herramienta Comercial Equifax Chile</div>
    </div>
  </div>
  <div class="uf-widget">
    <div class="uf-box">
      <label>UF Hoy (editable)</label>
      <input type="number" id="uf-global" value="40644" step="1">
    </div>
    <div class="uf-box">
      <label>Cotizaciones</label>
      <div class="qcount" id="quote-count">0</div>
    </div>
  </div>
</header>
<nav id="navrow"></nav>
<main id="main"></main>
<div id="global-toast" class="toast"></div>
<footer>CotizadorGo! &nbsp;·&nbsp; Herramienta Comercial Equifax Chile &nbsp;·&nbsp; CONFIDENCIAL &nbsp;·&nbsp; SOLO USO INTERNO</footer>
<script>
'use strict';
var STATE={quotes:[],activeQuoteIndex:-1,logoImg:null};
function _lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function _lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function getUF(){return parseFloat(document.getElementById('uf-global').value)||40644;}
function fmtN(n){return '$'+Math.round(n).toLocaleString('es-CL');}
function ufc(u){return u*getUF()*1.19;}
function ufn(u){return u*getUF();}
function hoy(){return new Date().toLocaleDateString('es-CL',{day:'2-digit',month:'long',year:'numeric'});}
function toast(msg,type,id){
  var el=document.getElementById(id||'global-toast');if(!el)return;
  el.className='toast '+(type||'ok');el.textContent=msg;el.style.display='block';
  clearTimeout(el._t);el._t=setTimeout(function(){el.style.display='none';},4500);
}

function preloadLogo(cb){
  if(STATE.logoImg&&STATE.logoImg.complete&&STATE.logoImg.naturalWidth>0){if(cb)cb(STATE.logoImg);return;}
  var img=new Image();
  img.onload=function(){STATE.logoImg=img;if(cb)cb(img);};
  img.onerror=function(){STATE.logoImg=null;if(cb)cb(null);};
  img.src='logo-equifax.png';
}

function saveQuote(obj){
  obj.fecha=hoy();obj.ufUsada=getUF();
  obj.ejecutivo=_lsGet('eq_exec_name')||'';
  obj.ejecutivoTel=_lsGet('eq_exec_tel')||'';
  obj.ejecutivoEmail=_lsGet('eq_exec_email')||'';
  STATE.quotes.push(obj);
  STATE.activeQuoteIndex=STATE.quotes.length-1;
  document.getElementById('quote-count').textContent=STATE.quotes.length;
  var tab=document.querySelector('.tab[data-id="mail"]');
  if(tab){tab.classList.add('has-quote');pulseMailTab();}
  playSound('save');
  toast('✔ Cotización guardada — ve a ✉ Plantillas para generar el correo','ok');
}
function removeQuote(i){
  STATE.quotes.splice(i,1);
  if(STATE.activeQuoteIndex>=STATE.quotes.length)STATE.activeQuoteIndex=STATE.quotes.length-1;
  document.getElementById('quote-count').textContent=STATE.quotes.length;
  renderQuoteList();
}
function renderQuoteList(){
  var el=document.getElementById('quote-panel-list');if(!el)return;
  if(!STATE.quotes.length){el.innerHTML='<p style="color:var(--wa);font-size:.8rem;padding:8px 0;">Sin cotizaciones guardadas. Usa el botón 💾 en cada calculadora.</p>';return;}
  el.innerHTML='<div class="quote-list">'+STATE.quotes.map(function(q,i){
    var act=i===STATE.activeQuoteIndex;
    return '<div class="qi" style="'+(act?'border-color:#2ecc71;background:rgba(46,204,113,.07);':'')+'">'+
      '<div><div class="qi-prod">'+q.prod+(act?' <span style="color:#2ecc71;font-size:.65rem;">● ACTIVA</span>':'')+'</div>'+
      '<div class="qi-meta">'+q.meta+(q.fecha?' · '+q.fecha:'')+'</div></div>'+
      '<div class="qi-price">'+(q.uf?q.uf+' UF':'—')+'</div>'+
      '<div class="qi-acts">'+
        '<button class="qibtn" onclick="useInMail('+i+')" style="'+(act?'color:#2ecc71;':'')+'">'+
          (act?'✔ Activa':'Usar')+'</button>'+
        '<button class="qibtn del" onclick="removeQuote('+i+')">✕</button>'+
      '</div></div>';
  }).join('')+'</div>';
}
function useInMail(i){
  var q=STATE.quotes[i];STATE.activeQuoteIndex=i;
  goTo('mail');
  setTimeout(function(){syncQuoteToForm(q);renderQuoteList();toast('✔ Datos cargados.','ok','mail-toast');},150);
}
function syncQuoteToForm(q){
  if(!q)return;
  var t=document.getElementById('mt');if(t&&q.tipo)t.value=q.tipo;
  var u=document.getElementById('mu');if(u&&q.uf!==undefined)u.value=q.uf;
  var ul=document.getElementById('mula');if(ul&&q.ufL!==undefined)ul.value=q.ufL;
  var c=document.getElementById('mc2');if(c&&q.cons)c.value=q.cons;
  var pl=document.getElementById('mp');if(pl&&q.plazo)pl.value=q.plazo;
  var ma=document.getElementById('ma');if(ma)ma.value=q.ejecutivo||_lsGet('eq_exec_name')||'';
  var mf=document.getElementById('mf');if(mf)mf.value=q.ejecutivoTel||_lsGet('eq_exec_tel')||'';
  var ml=document.getElementById('ml');if(ml)ml.value=q.ejecutivoEmail||_lsGet('eq_exec_email')||'';
  updWspLink();
  var b=document.getElementById('sync-banner');if(b){b.classList.add('on');setTimeout(function(){b.classList.remove('on');},5000);}
}

function goTo(id){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('on',t.dataset.id===id);});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.toggle('on',p.id==='p-'+id);});
  if(id==='mail'){setTimeout(function(){
    renderQuoteList();loadExecutivoFields();
    if(STATE.activeQuoteIndex>=0&&STATE.quotes[STATE.activeQuoteIndex])syncQuoteToForm(STATE.quotes[STATE.activeQuoteIndex]);
  },50);}
}

function showRes(id,d){
  var box=document.getElementById(id);if(!box)return;
  var ufL=d.ufLista||d.uf||0,ufV=d.ufVenta||d.uf||0;
  var hayDc=ufL>0&&ufV<ufL;
  var dc=hayDc?Math.round((1-ufV/ufL)*100):0;
  var slMin=(ufL>0?ufL*0.4:ufV*0.4);

function loadExecutivo(){
  var sn=_lsGet('eq_exec_name'),st2=_lsGet('eq_exec_tel'),se=_lsGet('eq_exec_email'),sd=_lsGet('eq_exec_date');
  var today=new Date().toDateString();
  if(sn){var ma=document.getElementById('ma');if(ma)ma.value=sn;var mf=document.getElementById('mf');if(mf&&st2)mf.value=st2;var ml=document.getElementById('ml');if(ml&&se)ml.value=se;}
  if(!sn||(sd&&sd!==today&&!sn)){
    setTimeout(function(){
      var nombre=prompt('👤 ¿Cuál es tu nombre como ejecutivo/a?\n(Se guardará y no volverá a preguntar hoy)','');
      if(nombre&&nombre.trim()){
        _lsSet('eq_exec_name',nombre.trim());_lsSet('eq_exec_date',today);
        var tel=prompt('📱 ¿Tu número WhatsApp/Tel? (opcional):','');
        if(tel&&tel.trim())_lsSet('eq_exec_tel',tel.trim());
        var email=prompt('✉ ¿Tu email? (opcional):','');
        if(email&&email.trim())_lsSet('eq_exec_email',email.trim());
        var ma2=document.getElementById('ma');if(ma2)ma2.value=nombre.trim();
        var mf2=document.getElementById('mf');if(mf2&&tel&&tel.trim())mf2.value=tel.trim();
        var ml2=document.getElementById('ml');if(ml2&&email&&email.trim())ml2.value=email.trim();
      }
    },800);
  }
}

function getProdName(pb){var el=pb?pb.querySelector('div:nth-child(2)'):null;return el?el.textContent:'';}
function getBenef(pb){

  if(!items.length&&pb){var ds=pb.querySelectorAll('div > div');ds.forEach(function(d){var t=d.textContent.replace(/^✔\s*/,'').trim();if(t&&t.length>3)items.push(t);});}

function getDcPct(dcBlock){
  var t=dcBlock?dcBlock.textContent.replace(/\s+/g,' ').trim():'';
  var m=t.match(/([\d]+)%/);var l=t.match(/Lista:\s*([\d.,]+)/);var f=t.match(/final:\s*([\d.,]+)/i);
  return{text:t,pct:m?m[1]:'',lista:l?l[1]:'',final:f?f[1]:''};
}

function rr(c,x,y,w,h,r,fill,stroke){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();if(fill){c.fillStyle=fill;c.fill();}if(stroke){c.strokeStyle=stroke;c.lineWidth=typeof stroke==='number'?stroke:1;c.stroke();}}
function wt(c,t,x,y,mw,lh,mx){if(!t)return y;var ws=t.split(' '),l='',lines=0;ws.forEach(function(w){var tt=l+w+' ';if(c.measureText(tt).width>mw&&l){if(!mx||lines<mx){c.fillText(l.trim(),x,y);y+=lh;lines++;}l=w+' ';}else l=tt;});if(!mx||lines<mx)c.fillText(l.trim(),x,y);return y+lh;}
function sepLine(ctx,x1,y,x2,alpha){var g=ctx.createLinearGradient(x1,y,x2,y);g.addColorStop(0,'rgba(155,28,46,'+alpha+')');g.addColorStop(1,'rgba(155,28,46,0)');ctx.fillStyle=g;ctx.fillRect(x1,y,x2-x1,1);}

function drawLogo(ctx,logoImg,x,y,h){
  if(!logoImg||!logoImg.naturalWidth)return;
  var w=Math.round(h*(logoImg.naturalWidth/logoImg.naturalHeight));
  var tc=document.createElement('canvas');tc.width=w*2;tc.height=h*2;
  var tx=tc.getContext('2d');tx.drawImage(logoImg,0,0,w*2,h*2);
  tx.globalCompositeOperation='source-in';tx.fillStyle='#fff';tx.fillRect(0,0,w*2,h*2);
  ctx.drawImage(tc,x,y,w,h);
}

function getCanvasPC(){
  return new Promise(function(resolve){
    preloadLogo(function(logo){
      if(!logo){toast('⚠ Logo no encontrado','err','tpl-toast2');return;}
      var d=getCardData();
      var pb=d.prodBlock,prodName=getProdName(pb),benef=getBenef(pb),dc=getDcPct(d.dctoBlock);
      var W=620,P=32,sc=2,lh=20;

      // ── PRE-MEDICIÓN de texto para calcular alturas reales ──
      var _cv0=document.createElement('canvas');
      var _ctx0=_cv0.getContext('2d');

      // Altura header aumentada para logo prominente
      var hHead=110;

      // Medir líneas del nombre de empresa (wrap a W-P*2)
      function measureLines(text, font, maxW) {
        _ctx0.font=font;
        var words=text.split(' '), line='', lines=0;
        words.forEach(function(w){
          var t=line+w+' ';
          if(_ctx0.measureText(t).width>maxW&&line){lines++;line=w+' ';}else line=t;
        });
        if(line.trim())lines++;
        return Math.max(1,lines);
      }

      var empLines=d.emp?measureLines(d.emp,'bold 20px Arial',W-P*2):0;
      var hEmp=d.emp?(32+empLines*26+16):0;

      var prodLines=measureLines(prodName,'bold 16px Arial',W-P*2);
      var hProd=14+16+(prodLines*22)+14+(Math.ceil(benef.length/2)*lh)+18;

      var hPrec=12+18+20+56+(d.clpText&&d.clpText!=='—'?22:0)+(dc.pct?52:0)+8;
      var hCond=56, hExec=72;
      var H=hHead+hEmp+hProd+hPrec+hCond+hExec;

      var cv=document.createElement('canvas');cv.width=W*sc;cv.height=H*sc;
      var ctx=cv.getContext('2d');ctx.scale(sc,sc);
      ctx.fillStyle='#0c0508';ctx.fillRect(0,0,W,H);

      var y=0;
      // ── HEADER ─────────────────────────────────────────────
      var hg=ctx.createLinearGradient(0,0,W,hHead);
      hg.addColorStop(0,'#5a0e1a');hg.addColorStop(.5,'#9b1c2e');hg.addColorStop(1,'#7a1425');
      ctx.fillStyle=hg;ctx.fillRect(0,y,W,hHead);

      // Logo GRANDE — centrado verticalmente en la mitad superior del header
      var logoH=62;
      drawLogo(ctx,logo,P,y+Math.round((hHead*0.55-logoH)/2)+4,logoH);

      // Subtítulo bajo el logo
      ctx.font='7.5px Arial';ctx.fillStyle='rgba(255,255,255,.38)';
      ctx.fillText('CHILE · SOLUCIONES EMPRESARIALES',P,y+hHead-12);

      // Badge — centrado verticalmente en header
      ctx.font='bold 10px Arial';
      var bw=ctx.measureText(d.badge).width+22;
      var badgeY=y+Math.round((hHead-26)/2);
      rr(ctx,W-P-bw,badgeY,bw,26,13,'rgba(0,0,0,.45)');

function getCanvasWsp(){
  return new Promise(function(resolve){

      var _cv0=document.createElement('canvas');

      function mLines(text,font,maxW){
        _c0.font=font;
        var words=text.split(' '),line='',n=0;
        words.forEach(function(w){var t=line+w+' ';if(_c0.measureText(t).width>maxW&&line){n++;line=w+' ';}else line=t;});

      // Beneficios — lista vertical, 1 por fila
      ctx.font='22px Arial';
      benef.forEach(function(item){
        var linesBefore=y;

      });
      y+=16;

      // ── PRECIO ───────────────────────────────────────────────
      var priceBlockH=hPrec;

      y+=22;

      ctx.fillStyle='#f0c040';ctx.fillText(d.precio,P,y+90);ctx.shadowBlur=0;y+=118;

      if(d.clpText&&d.clpText!=='—'){

      }
      if(dc.pct){

        rr(ctx,P,y,W-P*2,70,12,null,'rgba(46,204,113,.32)');
        ctx.font='bold 48px Arial';ctx.fillStyle='#2ecc71';ctx.fillText('−'+dc.pct+'%',P+20,y+50);
        ctx.font='21px Arial';ctx.fillStyle='#888';
        if(dc.lista)ctx.fillText('Lista: '+dc.lista+' UF',P+200,y+30);
        if(dc.final){ctx.fillStyle='#bbb';ctx.fillText('Final: '+dc.final+' UF',P+200,y+56);}
        y+=80;
      }
      y+=16;

      // ── CONDICIONES ──────────────────────────────────────────
      y+=8;
      sepLine(ctx,P,y,W-P,.25);y+=16;
      ctx.font='13px Arial';ctx.fillStyle='#666';ctx.fillText('CONDICIONES',P,y+16);y+=38;
      ctx.font='bold 34px Segoe UI,Arial';ctx.fillStyle='#fff';ctx.fillText(d.plazo,P,y);
      ctx.font='28px Arial';ctx.fillStyle='#2ecc71';ctx.fillText('POSTPAGO · 30 días',P+270,y);
      y+=hCond-38;

      // ── EJECUTIVO ────────────────────────────────────────────
      y+=8;
      sepLine(ctx,P,y,W-P,.22);y+=16;
      ctx.font='13px Arial';ctx.fillStyle='#666';ctx.fillText('EJECUTIVO/A COMERCIAL',P,y+16);y+=38;

      if(d.contacto){ctx.font='26px Arial';ctx.fillStyle='#3498db';ctx.fillText(d.contacto,P,y);y+=40;}

      // Pie
      ctx.textAlign='right';
      ctx.font='18px Arial';ctx.fillStyle='#3a3a3a';
      ctx.fillText(d.fecha,W-P,H-36);
      ctx.fillText('Valores + IVA · Sujeto a vigencia UF',W-P,H-12);
      ctx.textAlign='left';

      resolve(cv);
    });
  });
}

function handleCopy(cv,toastId){
  cv.toBlob(function(blob){
    if(navigator.clipboard&&window.ClipboardItem){
      navigator.clipboard.write([new ClipboardItem({'image/png':blob})])
        .then(function(){toast('🖼 Imagen copiada — pega directamente en WhatsApp, correo o chat','ok',toastId||'tpl-toast2');})
        .catch(function(){var url=URL.createObjectURL(blob);window.open(url,'_blank');toast('🖼 Imagen abierta — clic derecho → Copiar imagen','ok',toastId||'tpl-toast2');});
    }else{var url=URL.createObjectURL(blob);window.open(url,'_blank');toast('🖼 Imagen abierta — clic derecho → Copiar imagen','ok',toastId||'tpl-toast2');}
  },'image/png');
}

// SONIDOS UI — Web Audio API
// ══════════════════════════════════════════════
var _audioCtx=null;
function getAudio(){if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();return _audioCtx;}
function playTone(freq,dur,type,vol){
  try{
    var a=getAudio();var o=a.createOscillator();var g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type||'sine';o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.06,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur);
    o.start(a.currentTime);o.stop(a.currentTime+dur);
  }catch(e){}
}
function playSound(type){
  if(type==='hover'){playTone(880,.08,'sine',.03);}
  else if(type==='click'){playTone(660,.1,'sine',.05);setTimeout(function(){playTone(880,.08,'sine',.04);},60);}
  else if(type==='save'){playTone(523,.1,'sine',.06);setTimeout(function(){playTone(659,.1,'sine',.05);},100);setTimeout(function(){playTone(784,.15,'sine',.07);},200);}
  else if(type==='copy'){playTone(784,.08,'sine',.04);setTimeout(function(){playTone(1047,.1,'sine',.05);},80);}
}
function playHover(){playSound('hover');}
function playClick(){playSound('click');}

function pulseMailTab(){
  var tab=document.querySelector('.tab[data-id="mail"]');
  if(!tab)return;
  // Eliminar pulso anterior si existe
  tab.classList.remove('pulse-neon');
  void tab.offsetWidth; // reflow
  tab.classList.add('pulse-neon');
  // Tooltip de guía
  var tip=document.getElementById('mail-tab-tip');
  if(!tip){
    tip=document.createElement('div');tip.id='mail-tab-tip';
    tip.style.cssText='position:fixed;z-index:300;background:#1a1a1a;border:1px solid #2ecc71;border-radius:8px;padding:8px 14px;font-size:.75rem;color:#2ecc71;box-shadow:0 0 20px rgba(46,204,113,.4);pointer-events:none;white-space:nowrap;transition:opacity .3s;';
    tip.innerHTML='👆 <strong>¡Cotización guardada!</strong> Toca aquí para generar el correo';
    document.body.appendChild(tip);
  }
  // Posicionar sobre el tab
  var rect=tab.getBoundingClientRect();
  tip.style.top=(rect.bottom+8)+'px';
  tip.style.left=Math.max(8,rect.left-10)+'px';
  tip.style.opacity='1';tip.style.display='block';
  setTimeout(function(){tip.style.opacity='0';setTimeout(function(){tip.style.display='none';},400);},4000);
}

// REACTIVIDAD TOTAL — delegación sin whitelist de IDs
// ═══════════════════════════════════════════════════════════════
var _autoGenTimer = null;

function _mailOn() {
  var p = document.getElementById('p-mail');
  return p && p.classList.contains('on');
}

function scheduleAutoGen(ms) {
  clearTimeout(_autoGenTimer);
  var st = document.getElementById('auto-gen-status');
  if (st) { st.style.color='#f0c040'; st.textContent='⏳ Actualizando...'; }
  _autoGenTimer = setTimeout(function() {
    var tipo = document.getElementById('mt');
    if (!tipo) return;
    if (tipo.value) {
      genMail();
    } else {
      var out = document.getElementById('tpl-out');
      if (out) out.style.display = 'none';
      if (st) { st.style.color='#888'; st.textContent='← Selecciona un producto para generar'; }
    }
  }, ms !== undefined ? ms : 280);
}

// Delegación total — captura cualquier cambio en el panel mail
['input','change','click'].forEach(function(ev) {
  document.addEventListener(ev, function(e) {
    if (!_mailOn()) return;
    var t = e.target;
    if (t.tagName==='BUTTON' || t.tagName==='A' || t.tagName==='IMG') return;
    scheduleAutoGen(ev === 'click' ? 10 : 280);
  }, true);
});

// UF global afecta precios en plantillas
var _ufg = document.getElementById('uf-global');
if (_ufg) _ufg.addEventListener('input', function() {
  if (_mailOn()) scheduleAutoGen(300);
});

// toggleDest reactivo
function toggleDest(skip) {
  var df = document.getElementById('dest-fields');
  if (df) df.style.display = skip ? 'none' : 'flex';
  scheduleAutoGen(0);
}

// saveExecField reactivo
function saveExecField() {
  var ma=document.getElementById('ma'),mf=document.getElementById('mf'),ml=document.getElementById('ml');
  if(ma&&ma.value.trim())_lsSet('eq_exec_name',ma.value.trim());
  if(mf)_lsSet('eq_exec_tel',mf.value.trim());
  if(ml)_lsSet('eq_exec_email',ml.value.trim());
  updWspLink();
  scheduleAutoGen(300);
}

// goTo override — generar al entrar a plantillas
var _origGoTo = goTo;
goTo = function(id) {
  _origGoTo(id);
  if (id === 'mail') {
    setTimeout(function() {
      var tipo = document.getElementById('mt');
      var st = document.getElementById('auto-gen-status');
      if (tipo && tipo.value) { genMail(); }
      else if (st) { st.style.color='#888'; st.textContent='← Selecciona un producto para generar'; }
    }, 150);
  }
};

// syncQuoteToForm override — regenerar al sincronizar cotización
var _origSync = syncQuoteToForm;
syncQuoteToForm = function(q) {
  _origSync(q);
  setTimeout(function() { if (_mailOn()) scheduleAutoGen(100); }, 120);
};
